services:
  postgres:
    image: postgres:16-alpine
    container_name: ask-database-postgres
    environment:
      POSTGRES_DB: ask_database
      POSTGRES_USER: ask_database
      POSTGRES_PASSWORD: ask_database
    ports:
      - "5432:5432"
    volumes:
      - ask_database_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ask_database -d ask_database"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ask_database_postgres:
